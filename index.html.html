<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自社株信託　設計診断ヒアリング</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f5f0; color: #1a1a1a; }
.app { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 16px; font-weight: 500; }
.progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-bottom: 1.5rem; }
.progress-fill { height: 4px; background: #1a1a1a; border-radius: 2px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: #666; margin-bottom: 6px; }
.question-card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
.question-num { font-size: 12px; color: #888; margin-bottom: 8px; }
.question-text { font-size: 16px; font-weight: 500; line-height: 1.6; }
.note { font-size: 13px; color: #888; margin-top: 8px; font-style: italic; }
.skip-note { font-size: 13px; color: #1a6fa8; margin-top: 8px; background: #e8f4fc; padding: 8px 12px; border-radius: 8px; }
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
.option-btn { background: #fff; border: 0.5px solid #ddd; border-radius: 8px; padding: 14px 16px; text-align: left; cursor: pointer; font-size: 14px; color: #1a1a1a; line-height: 1.5; transition: border-color 0.15s, background 0.15s; display: flex; align-items: flex-start; gap: 10px; font-family: inherit; }
.option-btn:hover { border-color: #999; background: #f9f9f7; }
.option-btn.selected { border-color: #1a1a1a; border-width: 1.5px; background: #f5f5f0; }
.option-label { font-weight: 500; font-size: 13px; color: #888; flex-shrink: 0; min-width: 20px; }
.nav-row { display: flex; gap: 10px; justify-content: flex-end; }
.nav-btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 0.5px solid #ccc; background: transparent; color: #1a1a1a; font-family: inherit; }
.nav-btn:hover { background: #f5f5f0; }
.nav-btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.nav-btn.primary:hover { opacity: 0.85; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.type-card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.type-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 8px; margin-bottom: 8px; }
.primary-badge { background: #fff; border: 1.5px solid #1a1a1a; color: #1a1a1a; }
.secondary-badge { background: #f5f5f0; border: 0.5px solid #ccc; color: #666; }
.type-name { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.type-desc { font-size: 13px; color: #666; line-height: 1.6; }
.score-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin: 1rem 0; }
.score-item { background: #f5f5f0; border-radius: 8px; padding: 10px 8px; text-align: center; }
.score-item .sname { font-size: 11px; color: #888; margin-bottom: 4px; }
.score-item .sval { font-size: 18px; font-weight: 500; }
.design-card { background: #f5f5f0; border-radius: 8px; padding: 1rem; margin-bottom: 10px; }
.design-label { font-size: 11px; color: #888; margin-bottom: 4px; font-weight: 500; }
.design-val { font-size: 13px; line-height: 1.5; }
.risk-box { border: 0.5px solid #ddd; border-radius: 8px; padding: 10px 14px; margin-top: 10px; }
.risk-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.risk-val { font-size: 13px; line-height: 1.5; }
.restart-btn { width: 100%; padding: 12px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #1a1a1a; font-size: 14px; cursor: pointer; margin-top: 1rem; font-family: inherit; }
.restart-btn:hover { background: #f5f5f0; }
.intro-section { text-align: center; padding: 2rem 0; }
.intro-section h2 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
.intro-section p { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 1.5rem; }
.start-btn { padding: 14px 32px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-family: inherit; }
#resultSection { display: none; }
#quizSection { display: none; }
</style>
</head>
<body>
<div class="app">

<div id="introSection" class="intro-section">
  <h2>自社株信託　設計診断ヒアリング</h2>
  <p>18の質問にお答えいただくことで、<br>最適な信託設計の方向性を診断します。<br>所要時間：約10〜15分</p>
  <button class="start-btn" onclick="startQuiz()">はじめる</button>
</div>

<div id="quizSection">
  <div class="header"><h1>自社株信託　設計診断</h1></div>
  <div class="progress-label" id="progressLabel">質問 1 / 18</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:5.5%"></div></div>
  <div class="question-card">
    <div class="question-num" id="qNum">Q1</div>
    <div class="question-text" id="qText"></div>
    <div id="qNote" style="display:none;"></div>
  </div>
  <div class="options" id="optionsContainer"></div>
  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="prevQ()" disabled>戻る</button>
    <button class="nav-btn primary" id="nextBtn" onclick="nextQ()" disabled>次へ</button>
  </div>
</div>

<div id="resultSection">
  <div class="header">
    <h1>診断結果</h1>
    <p id="resultDate" style="font-size:13px;color:#888;margin-top:4px;"></p>
  </div>
  <div class="type-card">
    <div class="type-badge primary-badge">主タイプ</div>
    <div class="type-name" id="primaryName"></div>
    <div class="type-desc" id="primaryDesc"></div>
  </div>
  <div class="type-card">
    <div class="type-badge secondary-badge">副タイプ</div>
    <div class="type-name" id="secondaryName"></div>
    <div class="type-desc" id="secondaryDesc"></div>
  </div>
  <div class="score-grid" id="scoreGrid"></div>
  <div class="design-card">
    <div class="design-label">推奨：信託株式割合の目安</div>
    <div class="design-val" id="designShare"></div>
  </div>
  <div class="design-card">
    <div class="design-label">推奨：指図権設計</div>
    <div class="design-val" id="designDirection"></div>
  </div>
  <div class="design-card">
    <div class="design-label">副タイプ補助設計</div>
    <div class="design-val" id="designAddon"></div>
  </div>
  <div class="risk-box">
    <div class="risk-label">留意リスク</div>
    <div class="risk-val" id="designRisk"></div>
  </div>
  <button class="restart-btn" onclick="restart()">最初からやり直す</button>
</div>
</div>

<script>
const QUESTIONS = [
  { id:'Q1', text:'経営権の引継ぎについて、後継者はどの程度決まっていますか？',
    options:[
      {label:'A',text:'人物・時期ともに決まっている',scores:{Guardian:2}},
      {label:'B',text:'人物は決まっているが、時期はまだ',scores:{Guardian:1}},
      {label:'C',text:'人物のイメージはあるが、確定していない',scores:{}},
      {label:'D',text:'まだ白紙に近い',scores:{}}
    ]},
  { id:'Q2', text:'現在は問題ないとして、将来株主に相続が起きた場合、その家族と経営の話し合いをすることについてどう感じますか？',
    options:[
      {label:'A',text:'絶対に避けたい、今から手を打ちたい',scores:{Guardian:2}},
      {label:'B',text:'できれば避けたいが、まだ切迫感はない',scores:{Guardian:1}},
      {label:'C',text:'ある程度は仕方ないと思っている',scores:{}},
      {label:'D',text:'あまり気にしていない',scores:{}}
    ]},
  { id:'Q3', text:'株式の買取や贈与による承継を検討したことはありますか？',
    note:'※この質問はスコアには反映されません。承継への動機を確認する質問です。',
    noteClass:'note',
    options:[
      {label:'A',text:'検討したが、費用・税負担等の問題で断念した',scores:{}},
      {label:'B',text:'検討中だが、まだ決断できていない',scores:{}},
      {label:'C',text:'名前は知っているが、具体的には考えていない',scores:{}},
      {label:'D',text:'考えたことがない',scores:{}}
    ]},
  { id:'Q4', text:'議決権が分散して意思統一が図りづらくなることへの支障を感じますか？',
    options:[
      {label:'A',text:'強く感じる、今すぐ対処したい',scores:{Guardian:2}},
      {label:'B',text:'感じているが、まだ余裕はある',scores:{Guardian:1}},
      {label:'C',text:'将来はそうなるかもしれないと思う程度',scores:{}},
      {label:'D',text:'あまり感じていない',scores:{}}
    ]},
  { id:'Q5', text:'買取や贈与なしに議決権を集め、全体最適な経営ができるとしたら、いつ頃実現したいですか？',
    options:[
      {label:'A',text:'できるだけ早く、1〜2年以内に',scores:{Guardian:2}},
      {label:'B',text:'3〜5年以内に',scores:{Guardian:1}},
      {label:'C',text:'10年程度の猶予があってよい',scores:{}},
      {label:'D',text:'時期はまだ考えていない',scores:{}}
    ]},
  { id:'Q6', text:'議決権と財産権を分けて承継させ、後継者の意思決定を守りながら家族にも企業価値向上の恩恵を届けるスキームがあるとしたら、どう思いますか？',
    options:[
      {label:'A',text:'ぜひそうしたい、それが理想だ',scores:{Guardian:2}},
      {label:'B',text:'興味はあるが、家族の納得が得られるか不安',scores:{Guardian:1}},
      {label:'C',text:'財産は平等に分けたい、支配権の集中には抵抗がある',scores:{Balancer:1}},
      {label:'D',text:'家族全員で経営に関わってほしい',scores:{Balancer:1}}
    ]},
  { id:'Q7', text:'現在の株主構成と家族構成を教えてください。後継者以外に株主や相続人はいますか？',
    options:[
      {label:'A',text:'後継者以外に複数の株主・相続人がいる',scores:{Balancer:2}},
      {label:'B',text:'いるが、持株比率は小さい',scores:{Balancer:1}},
      {label:'C',text:'ほぼ後継者に集中している',scores:{}},
      {label:'D',text:'まだ整理できていない',scores:{}}
    ]},
  { id:'Q8', text:'踏み込んだことをお聞きしますが、家族間で経営や相続について、意見の違いや話しにくい雰囲気はありますか？',
    options:[
      {label:'A',text:'ある、すでに緊張感がある',scores:{Balancer:2}},
      {label:'B',text:'表立った対立はないが、話し合いを避けている',scores:{Balancer:1}},
      {label:'C',text:'概ね良好だが、将来は不安',scores:{}},
      {label:'D',text:'特に問題はない',scores:{}}
    ]},
  { id:'Q9', text:'承継を考えるとき、率直に言って一番手放しにくいのはどれですか？',
    options:[
      {label:'A',text:'経営の意思決定権（議決権・人事権）',scores:{Bridge:2}},
      {label:'B',text:'社内外での立場・影響力',scores:{Bridge:1}},
      {label:'C',text:'役員報酬や配当などの生活基盤',scores:{}},
      {label:'D',text:'特にこだわりはない',scores:{}}
    ]},
  { id:'Q10', text:'経営者の急病や認知症により会社が混乱した事例を、身近で見聞きしたことはありますか？',
    options:[
      {label:'A',text:'直接経験した・近しい人が経験した',scores:{Emergency:2}},
      {label:'B',text:'知人や業界で聞いたことがある',scores:{Emergency:1}},
      {label:'C',text:'ニュースや書籍で知っている程度',scores:{}},
      {label:'D',text:'特に聞いたことがない',scores:{}}
    ]},
  { id:'Q11', text:'それを見聞きしてどう感じましたか？自分も何か手を打ちたいと思いましたか？',
    skipIf:{qIndex:9,answerIn:[2,3]},
    skipNote:'前の質問で「ない」とお答えのため、この質問はスキップされました。',
    noteClass:'skip-note',
    options:[
      {label:'A',text:'強く危機感を感じた、すぐに動きたい',scores:{Emergency:2}},
      {label:'B',text:'他人事ではないと思ったが、まだ動けていない',scores:{Emergency:1}},
      {label:'C',text:'気になったが、自分は大丈夫だと思った',scores:{}},
      {label:'D',text:'特に何も感じなかった',scores:{}}
    ]},
  { id:'Q12', text:'後継者に身につけてほしいものとして、次のどれが最も近いですか？またそれが備われば承継できますか？',
    options:[
      {label:'A',text:'見返りを求めない、人のための行動力',scores:{Bridge:2}},
      {label:'B',text:'多様な意見を受け止め調整するバランス感覚',scores:{Bridge:1}},
      {label:'C',text:'人を動かす説得力・求心力',scores:{Bridge:1}},
      {label:'D',text:'まだ後継者自身が定まっていない',scores:{}}
    ]},
  { id:'Q13', text:'VUCAの時代に企業価値を守り続けることを、社内や身内の後継者に求めるのは酷かもしれないと感じたことはありますか？',
    options:[
      {label:'A',text:'ある、外部への売却や譲渡も選択肢として考えている',scores:{Exit:2}},
      {label:'B',text:'感じたことはあるが、まだ身内承継を諦めていない',scores:{Exit:1}},
      {label:'C',text:'厳しい時代だとは思うが、後継者を信じたい',scores:{}},
      {label:'D',text:'そう感じたことはない',scores:{}}
    ]},
  { id:'Q14', text:'他社の買収や対等統合を自ら仕掛けることを考えたことはありますか？',
    options:[
      {label:'A',text:'ある、積極的に考えている',scores:{Exit:1}},
      {label:'B',text:'興味はあるが、現実的には難しいと思っている',scores:{Exit:1}},
      {label:'C',text:'とても無理、自社を守ることで精一杯',scores:{}},
      {label:'D',text:'考えたことがない',scores:{}}
    ]},
  { id:'Q15', text:'自社の企業価値（株式価値）をおおよそ把握していますか？',
    options:[
      {label:'A',text:'把握している、専門家に試算してもらったことがある',scores:{Exit:2}},
      {label:'B',text:'なんとなく想像はできるが、正確には知らない',scores:{Exit:1}},
      {label:'C',text:'考えたことはあるが、調べていない',scores:{}},
      {label:'D',text:'把握していない・考えたことがない',scores:{}}
    ]},
  { id:'Q16', text:'自社株の承継で一番避けたいことは何ですか？',
    options:[
      {label:'A',text:'会社・家族・従業員が自分の判断ミスや不在で迷うこと',scores:{Emergency:1,Guardian:1}},
      {label:'B',text:'買取や贈与にかかる税金・費用の負担',scores:{}},
      {label:'C',text:'承継後に経営が不安定になること',scores:{Bridge:1}},
      {label:'D',text:'まだ具体的に考えていない',scores:{}}
    ]},
  { id:'Q17', text:'万一判断能力を失った場合、成年後見制度により弁護士等が月5万円・20年で約1,440万円の報酬を受け取りながら会社経営に関与する可能性があります。これについてどう感じますか？',
    options:[
      {label:'A',text:'それは困る、自分で信頼できる人に託す仕組みを作りたい',scores:{Emergency:2}},
      {label:'B',text:'問題だと思うが、具体的な対策を考えていなかった',scores:{Emergency:1}},
      {label:'C',text:'仕方ない部分もあると思う',scores:{}},
      {label:'D',text:'初めて知った、まだ判断できない',scores:{}}
    ]},
  { id:'Q18', text:'今日のお話を踏まえて、自社株信託の設計を具体的に進めることへの気持ちはどうですか？',
    options:[
      {label:'A',text:'ぜひ進めたい、早く動きたい',scores:{Guardian:1,Emergency:1}},
      {label:'B',text:'前向きだが、もう少し検討したい',scores:{Bridge:1}},
      {label:'C',text:'興味はあるが、家族や税理士と相談してから',scores:{Balancer:1}},
      {label:'D',text:'まだ決断できない',scores:{}}
    ]}
];

const TYPES = {
  Guardian:  {jp:'継続統治型',desc:'理念維持・統治集中・外部防御。支配権を強く守り、変更しにくい設計を好む。',share:'原則：67%以上（特別決議ライン確保）',direction:'事項別指図（重要事項は委託者集中）＋監督人承認を要所に付す',risk:'硬直化・後継者育成不足・平等思想との衝突'},
  Bridge:    {jp:'段階承継型',desc:'段階的に権限移譲。「今は握るが、条件が整えば渡す」を設計する。',share:'目安：51〜67%（移行設計に合わせ調整）',direction:'指図者交代型（委託者→共同→後継者）＋移行トリガー明確化',risk:'共同指図で停止・判断遅延・トリガー曖昧化'},
  Exit:      {jp:'出口柔軟型',desc:'売却も視野。売却判断と価格決定を分離し、出口を滑らかにする。',share:'状況：必要割合のみ（M&A/支配要件で最適化）',direction:'処分事項限定指図（売却判断は別設計）＋価格は受託者/算定条項へ',risk:'期待不一致・税務爆発・売却時対立'},
  Balancer:  {jp:'家族調整型',desc:'紛争回避・平等志向。経済権と支配権を分け、家族関係を守る。',share:'支配は後継者に寄せ、経済権を分散（要調整）',direction:'共同指図／多数決指図＋監督人関与＋透明性条項',risk:'意思決定速度低下・支配弱体化'},
  Emergency: {jp:'凍結回避型',desc:'認知症・急変で止めない。短時間で安全弁を作る。',share:'必要割合で可（ただし停止を避ける割合）',direction:'委託者指図→判断不能で自動移行（医師診断等トリガー）',risk:'将来の再設計困難・税務未成熟'}
};

let currentQ=0, answers=new Array(18).fill(null), skipped=new Array(18).fill(false);

function isSkipped(idx){
  const q=QUESTIONS[idx];
  if(!q.skipIf) return false;
  const a=answers[q.skipIf.qIndex];
  return a!==null && q.skipIf.answerIn.includes(a);
}

function startQuiz(){
  document.getElementById('introSection').style.display='none';
  document.getElementById('quizSection').style.display='block';
  renderQuestion();
}

function renderQuestion(){
  const q=QUESTIONS[currentQ];
  document.getElementById('progressLabel').textContent=`質問 ${currentQ+1} / 18`;
  document.getElementById('progressFill').style.width=`${((currentQ+1)/18)*100}%`;
  document.getElementById('qNum').textContent=q.id;
  document.getElementById('qText').textContent=q.text;
  const noteEl=document.getElementById('qNote');
  const skip=isSkipped(currentQ);
  skipped[currentQ]=skip;
  if(skip && q.skipNote){
    noteEl.textContent=q.skipNote;
    noteEl.className='skip-note';
    noteEl.style.display='block';
  } else if(q.note){
    noteEl.textContent=q.note;
    noteEl.className='note';
    noteEl.style.display='block';
  } else {
    noteEl.style.display='none';
  }
  const container=document.getElementById('optionsContainer');
  container.innerHTML='';
  if(skip){
    answers[currentQ]=-1;
    document.getElementById('nextBtn').disabled=false;
  } else {
    q.options.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='option-btn'+(answers[currentQ]===i?' selected':'');
      btn.innerHTML=`<span class="option-label">${opt.label}</span><span>${opt.text}</span>`;
      btn.onclick=()=>selectOption(i);
      container.appendChild(btn);
    });
    document.getElementById('nextBtn').disabled=answers[currentQ]===null;
  }
  document.getElementById('prevBtn').disabled=currentQ===0;
  document.getElementById('nextBtn').textContent=currentQ===17?'診断結果を見る':skip?'スキップして次へ':'次へ';
}

function selectOption(idx){
  answers[currentQ]=idx;
  document.querySelectorAll('.option-btn').forEach((b,i)=>b.classList.toggle('selected',i===idx));
  document.getElementById('nextBtn').disabled=false;
}

function nextQ(){
  if(currentQ<17){currentQ++;renderQuestion();}
  else showResult();
}

function prevQ(){
  if(currentQ>0){currentQ--;if(skipped[currentQ])answers[currentQ]=-1;renderQuestion();}
}

function showResult(){
  const scores={Guardian:0,Bridge:0,Exit:0,Balancer:0,Emergency:0};
  QUESTIONS.forEach((q,qi)=>{
    const a=answers[qi];
    if(a!==null&&a!==-1) Object.keys(q.options[a].scores).forEach(t=>{scores[t]+=q.options[a].scores[t];});
  });
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const primary=sorted[0][0], secondary=sorted[1][0];
  document.getElementById('quizSection').style.display='none';
  document.getElementById('resultSection').style.display='block';
  const now=new Date();
  document.getElementById('resultDate').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  document.getElementById('primaryName').textContent=`${TYPES[primary].jp}（${primary}）`;
  document.getElementById('primaryDesc').textContent=TYPES[primary].desc;
  document.getElementById('secondaryName').textContent=`${TYPES[secondary].jp}（${secondary}）`;
  document.getElementById('secondaryDesc').textContent=TYPES[secondary].desc;
  document.getElementById('scoreGrid').innerHTML=sorted.map(([t,v])=>`<div class="score-item"><div class="sname">${TYPES[t].jp}</div><div class="sval">${v}</div></div>`).join('');
  document.getElementById('designShare').textContent=TYPES[primary].share;
  document.getElementById('designDirection').textContent=TYPES[primary].direction;
  document.getElementById('designAddon').textContent=`副タイプ「${TYPES[secondary].jp}」の観点から：${TYPES[secondary].direction}`;
  document.getElementById('designRisk').textContent=TYPES[primary].risk;
}

function restart(){
  currentQ=0;answers=new Array(18).fill(null);skipped=new Array(18).fill(false);
  document.getElementById('resultSection').style.display='none';
  document.getElementById('quizSection').style.display='none';
  document.getElementById('introSection').style.display='block';
}
</script>
</body>
</html>
